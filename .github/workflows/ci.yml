name: Docker Build Workflow

# Define quando o pipeline será executado
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login no Docker Registry
      # No GitHub, usamos segredos (Secrets) para manter a segurança
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # registry: ghcr.io (Opcional: use se for o Container Registry do GitHub)

      # 3. Execução do Build
      - name: Build Docker Image
        run: |
          echo "Simulando um docker build"
          # docker build -t minha-imagem:latest .
      - name: Build and Push Docker Image
        run: |
          # Definimos o nome da imagem (ajuste se usar Docker Hub em vez do GHCR)
          IMAGE_NAME=ghcr.io/${{ github.repository }}

          # Build da imagem com as duas tags (SHA e Latest)
          docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

          # Push das imagens para o registro
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest