name: Docker Build Workflow

# Define quando o pipeline será executado
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login no Docker Registry
      # No GitHub, usamos segredos (Secrets) para manter a segurança
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # registry: ghcr.io (Opcional: use se for o Container Registry do GitHub)

      # 3. Execução do Build
      - name: Build Docker Image
        run: |
          echo "Simulando um docker build"
          # docker build -t minha-imagem:latest .
      
      - name: Build and Push
        run: |
          # Substitua 'seu-usuario' pelo seu login do Docker Hub ou use uma variável
          # Aqui estamos definindo o nome da imagem seguindo o padrão do Docker Hub
          IMAGE_NAME=${{ secrets.DOCKER_USER }}/meu-projeto-docker

          # Build com as duas tags (SHA do commit e Latest)
          docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

          # Push para o Docker Hub
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest